baseURL = "https://thespacecoaststories.com/"
locale = "en-us"
title = "Space Coast Stories"
defaultContentLanguage = "en"
enableRobotsTXT = true
enableEmoji = true

# Blog posts dated in the future stay hidden until their date arrives.
buildFuture = false
summaryLength = 40

[params]
  description = "Legacy storytelling and personal history for Brevard County families. We help you capture the people you love, in their own words, while there's still time to ask."
  # These fall back to data/site.yaml values in templates; kept here for quick reference.

[markup]
  [markup.goldmark.renderer]
    unsafe = true          # allow raw HTML in markdown (needed for some blog embeds)
  [markup.highlight]
    noClasses = false
    style = "friendly"

[taxonomies]
  tag = "tags"
  category = "categories"

