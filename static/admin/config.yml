backend:
  name: git-gateway
  repo: claire792/thespacecoaststories
  branch: main
  # DecapBridge login (site ID from your DecapBridge dashboard).
  identity_url: https://auth.decapbridge.com/sites/b0bf3693-b1fe-491d-9bdb-2e3d8debbcf5
  gateway_url: https://gateway.decapbridge.com

# Friendlier commit messages when you save in the CMS.
commit_messages:
  create: 'Create {{collection}} "{{slug}}" — {{author-name}}'
  update: 'Update {{collection}} "{{slug}}" — {{author-name}}'
  delete: 'Delete {{collection}} "{{slug}}" — {{author-name}}'
  uploadMedia: 'Upload "{{path}}" — {{author-name}}'
  deleteMedia: 'Delete "{{path}}" — {{author-name}}'

# Lets you run the CMS locally with `npx decap-server` (see README).
local_backend: true

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

site_url: https://thespacecoaststories.com
display_url: https://thespacecoaststories.com
logo_url: https://thespacecoaststories.com/images/scs-emblem.png

collections:
  # ------------------------------------------------------------------
  - name: "blog"
    label: "Journal Posts"
    label_singular: "Post"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}  ·  {{year}}-{{month}}-{{day}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "SEO title", name: "seo_title", widget: "string", required: false, hint: "Optional shorter Google title. Aim for 50–60 characters." }
      - { label: "Publish date", name: "date", widget: "datetime" }
      - { label: "Updated date", name: "lastmod", widget: "datetime", required: false, hint: "Change this when you meaningfully revise the post." }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Legacy Books", "How to Start", "Local History", "Memorial", "Behind the Scenes", "Space Coast Lives"]
        default: "How to Start"
      - label: "Series"
        name: "series"
        widget: "select"
        multiple: true
        required: false
        options: ["Ask a Historian", "Space Coast Lives", "Florida Lives", "Memory, Loss, and Legacy"]
        hint: "Choose a recurring journal series when the article belongs to one."
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "SEO description", name: "description", widget: "text", required: false, hint: "One or two sentences for Google and social previews." }
      - label: "FAQs (great for Google + AI answers)"
        name: "faqs"
        widget: "list"
        required: false
        label_singular: "FAQ"
        summary: "{{fields.q}}"
        fields:
          - { label: "Question", name: "q", widget: "string" }
          - { label: "Answer", name: "a", widget: "text" }
      - { label: "Cover image", name: "image", widget: "image", required: false }
      - { label: "Cover image alt text", name: "image_alt", widget: "string", required: false }
      - { label: "Image credit", name: "image_credit", widget: "string", required: false, hint: "Photographer or source name." }
      - { label: "Image credit URL", name: "image_credit_url", widget: "string", required: false }
      - { label: "Image source", name: "image_source", widget: "string", required: false, hint: "Example: Unsplash, NASA, Library of Congress, or Wikimedia Commons." }
      - { label: "Image source URL", name: "image_source_url", widget: "string", required: false }
      - { label: "Image license", name: "image_license", widget: "string", required: false, hint: "Example: Public domain, CC BY 2.0, or CC BY-SA 4.0." }
      - { label: "Image license URL", name: "image_license_url", widget: "string", required: false }
      - { label: "Draft (hide until ready)", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # ------------------------------------------------------------------
  - name: "events"
    label: "Events & Classes"
    label_singular: "Event"
    folder: "content/events"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}  ·  {{event_date}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "SEO title", name: "seo_title", widget: "string", required: false, hint: "Optional shorter Google title. Aim for 50–60 characters." }
      - { label: "SEO description", name: "description", widget: "text", hint: "A unique 140–160 character summary for search results." }
      - { label: "Event date", name: "event_date", widget: "datetime", hint: "The day the event actually happens. Future dates are fine." }
      - label: "Type"
        name: "event_type"
        widget: "select"
        options: ["Vendor fair", "Free class", "Workshop", "Community session"]
        default: "Free class"
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Published on", name: "date", widget: "hidden", default: "2026-07-11" }
      - { label: "Details", name: "body", widget: "markdown", hint: "A short description shown on the events page." }

  # ------------------------------------------------------------------
  - name: "site_pages"
    label: "Service, Portfolio & Location Pages"
    label_singular: "Page"
    folder: "content"
    create: true
    filter: { field: "managed_page", value: true }
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "SEO title", name: "seo_title", widget: "string", required: false }
      - { label: "SEO description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Portrait / page image", name: "portrait", widget: "image", required: false }
      - { label: "Image alt text", name: "portrait_alt", widget: "string", required: false }
      - { label: "Eyebrow", name: "eyebrow", widget: "string", required: false }
      - { label: "Lead", name: "lead", widget: "text", required: false }
      - { label: "Schema type", name: "schema_type", widget: "hidden", default: "Service", required: false }
      - { label: "Service type", name: "service_type", widget: "string", required: false }
      - { label: "Areas served", name: "area_served", widget: "list", required: false }
      - label: "FAQs"
        name: "faqs"
        widget: "list"
        required: false
        fields:
          - { label: "Question", name: "q", widget: "string" }
          - { label: "Answer", name: "a", widget: "text" }
      - label: "Classes / Programs"
        name: "programs"
        widget: "list"
        required: false
        label_singular: "Class"
        summary: "{{fields.name}}"
        hint: "Featured classes show as large blocks (with photo, who it's for, and format). Leave 'Featured' off for a short program card."
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "One-line tagline", name: "tagline", widget: "string", required: false }
          - { label: "Feature this class", name: "featured", widget: "boolean", default: false, required: false }
          - { label: "Status badge", name: "status", widget: "string", required: false, hint: "e.g. 'Now booking' or 'Free first demo'. Featured classes only." }
          - { label: "Photo", name: "image", widget: "image", required: false, hint: "Featured classes only." }
          - { label: "Photo alt text", name: "image_alt", widget: "string", required: false }
          - { label: "Who it's for", name: "who", widget: "text", required: false, hint: "Featured classes only." }
          - { label: "Format", name: "format", widget: "text", required: false, hint: "Featured classes only." }
          - { label: "Description", name: "body", widget: "text", required: false, hint: "A short paragraph. Featured classes only." }
      - { label: "Show contact prompt", name: "show_contact_cta", widget: "boolean", default: true, required: false }
      - { label: "Managed page", name: "managed_page", widget: "hidden", default: true }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Site Settings"
    editor:
      preview: false
    files:
      - name: "site"
        label: "Contact & Site Info"
        file: "data/site.yaml"
        fields:
          - { label: "Business name", name: "business_name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Location", name: "location", widget: "string" }
          - { label: "Service areas", name: "service_areas", widget: "list" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Phone note", name: "phone_note", widget: "string" }
          - { label: "Square checkout URL", name: "square_checkout_url", widget: "string", hint: "Paste your Square Online link for the card kits." }
          - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
          - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
          - { label: "Newsletter name", name: "newsletter_name", widget: "string", required: false }
          - { label: "Footer note", name: "footer_note", widget: "string" }

  # ------------------------------------------------------------------
  - name: "pages"
    label: "Pages"
    editor:
      preview: false
    files:
      # ---- HOME ----
      - name: "home"
        label: "Home Page"
        file: "content/_index.md"
        fields:
          - { label: "Title", name: "title", widget: "hidden", default: "Home" }
          - { label: "SEO description", name: "description", widget: "text" }
          - { label: "Social share image", name: "image", widget: "image", required: false }
          - { label: "Hero eyebrow", name: "hero_eyebrow", widget: "string" }
          - { label: "Hero heading", name: "hero_heading", widget: "string" }
          - label: "Rotating prompts"
            name: "hero_prompts"
            widget: "list"
            hint: "These fade through in the hero card. Add or edit the questions."
            field: { label: "Prompt", name: "prompt", widget: "string" }
          - { label: "Hero subtext", name: "hero_sub", widget: "text" }
          - { label: "Hero button 1", name: "hero_cta1", widget: "string" }
          - { label: "Hero button 2", name: "hero_cta2", widget: "string" }
          - { label: "Offerings heading", name: "offerings_heading", widget: "string" }
          - { label: "Offerings subtext", name: "offerings_sub", widget: "text" }
          - label: "Offerings (3 cards)"
            name: "offerings"
            widget: "list"
            fields:
              - { label: "Badge", name: "num", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
              - { label: "Link URL", name: "url", widget: "string" }
              - { label: "Link text", name: "link_text", widget: "string" }
          - { label: "Why quote", name: "why_quote", widget: "text" }
          - { label: "Why body", name: "why_body", widget: "text" }
          - { label: "How heading", name: "how_heading", widget: "string" }
          - { label: "How subtext", name: "how_sub", widget: "text" }
          - label: "Process steps"
            name: "steps"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
          - { label: "Demo heading", name: "demo_heading", widget: "string" }
          - { label: "Demo body", name: "demo_body", widget: "text" }
          - label: "Book showcase"
            name: "book_showcase"
            widget: "list"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt text", name: "alt", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Caption", name: "caption", widget: "text" }
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            required: false
            fields:
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
          - label: "Journal series"
            name: "journal_series"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Series values", name: "series_values", widget: "list", field: { label: "Series", name: "series", widget: "string" }, hint: "Exact journal series name(s) this homepage section should pull from." }
          - { label: "For-communities heading", name: "b2b_heading", widget: "string" }
          - { label: "For-communities body", name: "b2b_body", widget: "text" }
          - { label: "Closing heading", name: "cta_heading", widget: "string" }
          - { label: "Closing body", name: "cta_body", widget: "text" }

      # ---- ABOUT ----
      - name: "about"
        label: "About Page"
        file: "content/about.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "SEO description", name: "description", widget: "text" }
          - { label: "Social share image", name: "image", widget: "image", required: false }
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Lead", name: "lead", widget: "text" }
          - { label: "Show contact prompt at end", name: "show_contact_cta", widget: "boolean", default: true }
          - { label: "Body", name: "body", widget: "markdown" }

      # ---- PORTFOLIO ----
      - name: "portfolio"
        label: "Portfolio & Sample Pages"
        file: "content/portfolio.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "SEO title", name: "seo_title", widget: "string", required: false }
          - { label: "SEO description", name: "description", widget: "text" }
          - { label: "Social image", name: "image", widget: "image", required: false }
          - { label: "Layout", name: "layout", widget: "hidden", default: "portfolio" }
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Lead", name: "lead", widget: "text" }
          - label: "Book examples"
            name: "book_examples"
            widget: "list"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt text", name: "alt", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Caption", name: "caption", widget: "text" }
          - label: "Interior gallery"
            name: "inside_gallery"
            widget: "list"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt text", name: "alt", widget: "string" }
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            required: false
            fields:
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }

      # ---- BREVARD COUNTY ----
      - name: "brevard-county"
        label: "Brevard County Page"
        file: "content/brevard-county.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "SEO title", name: "seo_title", widget: "string", required: false }
          - { label: "SEO description", name: "description", widget: "text" }
          - { label: "Social share image", name: "image", widget: "image", required: false }
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Lead", name: "lead", widget: "text" }
          - { label: "Layout", name: "layout", widget: "hidden", default: "service-areas" }
          - label: "Regional pages"
            name: "areas"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Description", name: "body", widget: "text" }
          - label: "FAQs"
            name: "faqs"
            widget: "list"
            required: false
            fields:
              - { label: "Question", name: "q", widget: "string" }
              - { label: "Answer", name: "a", widget: "text" }
          - { label: "Show contact prompt at end", name: "show_contact_cta", widget: "boolean", default: true }
          - { label: "Body", name: "body", widget: "markdown" }

      # ---- SERVICES ----
      - name: "services"
        label: "Services & Pricing"
        file: "content/services.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "SEO description", name: "description", widget: "text" }
          - { label: "Social share image", name: "image", widget: "image", required: false }
          - { label: "Layout", name: "layout", widget: "hidden", default: "services" }
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Lead", name: "lead", widget: "text" }
          - { label: "Positioning line", name: "positioning", widget: "text" }
          - { label: "Local service heading", name: "local_heading", widget: "string" }
          - { label: "Local service description", name: "local_body", widget: "text" }
          - { label: "Inside-pages heading", name: "inside_heading", widget: "string", required: false }
          - { label: "Inside-pages subtext", name: "inside_sub", widget: "text", required: false }
          - label: "Inside sample pages"
            name: "inside_pages"
            widget: "list"
            required: false
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt text", name: "alt", widget: "string" }
          - { label: "Portfolio heading", name: "portfolio_heading", widget: "string", required: false }
          - { label: "Portfolio body", name: "portfolio_body", widget: "text", required: false }
          - { label: "Books heading", name: "books_heading", widget: "string" }
          - { label: "Books subtext", name: "books_sub", widget: "text" }
          - label: "Book tiers"
            name: "book_tiers"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Features", name: "features", widget: "list", field: { label: "Feature", name: "feature", widget: "string" } }
              - { label: "Button text", name: "cta", widget: "string" }
              - { label: "Button URL", name: "cta_url", widget: "string", required: false }
              - { label: "Highlight this tier", name: "featured", widget: "boolean", default: false }
          - { label: "Payment note", name: "payment_note", widget: "text" }
          - { label: "Other services heading", name: "other_heading", widget: "string" }
          - { label: "Link text (cards)", name: "cta_text", widget: "string", default: "Learn more" }
          - label: "Other services"
            name: "other_services"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Link URL", name: "cta_url", widget: "string", required: false }
          - label: "FAQs"
            name: "faqs"
            widget: "list"
            fields:
              - { label: "Question", name: "q", widget: "string" }
              - { label: "Answer", name: "a", widget: "text" }
          - { label: "Show contact prompt", name: "show_contact_cta", widget: "boolean", default: false }

      # ---- CARD KITS ----
      - name: "card-kits"
        label: "Card Kits Page"
        file: "content/card-kits.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "SEO description", name: "description", widget: "text" }
          - { label: "Social share image", name: "image", widget: "image", required: false }
          - { label: "Layout", name: "layout", widget: "hidden", default: "card-kits" }
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Lead", name: "lead", widget: "text" }
          - { label: "Sample card question", name: "sample_card", widget: "text" }
          - { label: "Packs heading", name: "packs_heading", widget: "string" }
          - { label: "Packs subtext", name: "packs_sub", widget: "text" }
          - label: "Packs"
            name: "packs"
            widget: "list"
            fields:
              - { label: "Badge", name: "badge", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Count / label", name: "count", widget: "string" }
          - { label: "Use heading", name: "use_heading", widget: "string" }
          - { label: "Use body", name: "use_body", widget: "text" }

      # ---- CONTACT ----
      - name: "contact"
        label: "Contact Page"
        file: "content/contact.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "SEO description", name: "description", widget: "text" }
          - { label: "Social share image", name: "image", widget: "image", required: false }
          - { label: "Layout", name: "layout", widget: "hidden", default: "contact" }
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Lead", name: "lead", widget: "text" }
          - { label: "Body", name: "body", widget: "markdown" }
