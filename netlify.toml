[build]
  publish = "public"
  command = "hugo --gc --minify"

[build.environment]
  HUGO_VERSION = "0.164.0"
  HUGO_ENV = "production"
  TZ = "America/New_York"

# Nice-to-have: pretty 404 and security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

# Redirect the Decap admin trailing slash
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

# SEO route cleanup: preserve authority from older/incorrect URLs and remove 4XX crawl paths.
[[redirects]]
  from = "/journal"
  to = "/blog/"
  status = 301
  force = true

[[redirects]]
  from = "/journal/*"
  to = "/blog/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/tags"
  to = "/blog/"
  status = 301
  force = true

[[redirects]]
  from = "/tags/*"
  to = "/blog/"
  status = 301
  force = true

[[redirects]]
  from = "/remembering"
  to = "/blog/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/was-jim-morrison-born-in-melbourne-florida"
  to = "/blog/jim-morrison-melbourne-florida/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/was-jim-morrison-born-in-melbourne-florida/"
  to = "/blog/jim-morrison-melbourne-florida/"
  status = 301
  force = true

