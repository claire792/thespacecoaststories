<header class="site-header">
  <div class="wrap site-header__inner">
    <a class="brand" href="{{ "/" | relURL }}" aria-label="Space Coast Stories home">
      {{ partial "logo.html" . }}
      <span>
        <span class="brand__name">Space Coast Stories</span>
        <span class="brand__sub">Legacy Storytelling</span>
      </span>
    </a>

    <button class="nav-toggle" aria-label="Menu" aria-expanded="false" aria-controls="site-nav">
      <span></span><span></span><span></span>
    </button>

    <nav class="nav" id="site-nav" aria-label="Primary">
      {{ range site.Menus.main }}
        {{ if .HasChildren }}
        <span class="nav-item has-sub">
          <a href="{{ .URL }}" class="nav-parent">{{ .Name }}<span class="nav-caret" aria-hidden="true">▾</span></a>
          <span class="subnav">
            {{ range .Children }}<a href="{{ .URL }}">{{ .Name }}</a>{{ end }}
          </span>
        </span>
        {{ else }}
        <a href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
      {{ end }}
      <a class="btn btn-primary" href="{{ "/contact/" | relURL }}">Start a project</a>
    </nav>
  </div>
</header>
