{{ define "main" }}
<section class="section">
  <div class="wrap-narrow">
    {{ with .Params.eyebrow }}<span class="eyebrow">{{ . }}</span>{{ end }}
    <h1>{{ .Title }}</h1>
    {{ with .Params.lead }}<p class="lead">{{ . }}</p>{{ end }}
    <div class="prose">{{ .Content }}</div>
    <div class="post-list" style="margin-top:2rem;">
      {{ range .Pages }}
      <article class="post-item">
        <div class="post-item__meta">{{ .Date.Format "Jan 2, 2006" }}</div>
        <div>
          <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
          <p>{{ .Summary }}</p>
        </div>
      </article>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
